; FluckFlock Wi-Fi Companion Firmware — PlatformIO configuration
;
; Target board: Official Flipper Zero Wi-Fi Dev Board (ESP32-S2-WROVER-I)
;   Board ID: esp32-s2-saola-1  (generic ESP32-S2 SAOLA / WROVER)
;
; If your toolchain doesn't know esp32-s2-saola-1, use:
;   board = lolin_s2_mini   (same SoC; adjust UART pins if needed)
;
; UART wiring (Flipper ↔ ESP32-S2 on the official dev board):
;   Flipper GPIO 13 (TX) ─── ESP32-S2 GPIO 44 (U0RXD / UART0 RX)
;   Flipper GPIO 14 (RX) ─── ESP32-S2 GPIO 43 (U0TXD / UART0 TX)
;   GND ─────────────────── GND
;
; The ESP32-S2 UART0 hardware pins 43/44 are used for the Flipper link.
; USB CDC (native USB on the ESP32-S2) is used for debug output.

[env:fluckflock_companion]
platform  = espressif32
board     = esp32-s2-saola-1
framework = arduino

; Flipper UART baud matches 115200
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_MODE=1
    ; ARDUINO_USB_CDC_ON_BOOT=1 removed: causes HardwareSerial.cpp framework error
    ; on espressif32 3.x (Serial is not declared in scope). Without this flag,
    ; Serial/Serial0 both map to UART0, which is what the Flipper link needs.
    ; Channel to use for beacon injection (1–13, must be legal in your region)
    -DFLUCKFLOCK_CHANNEL=6
