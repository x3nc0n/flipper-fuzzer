name: Host Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  host-tests:
    name: Build and run host test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure build tools are present
        run: |
          sudo apt-get install -y --no-install-recommends build-essential

      - name: Run host tests
        working-directory: test
        run: make test
